name: Build & Release EXE

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write        # ← Releases 생성/업로드 권한

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install PyQt5 Pillow openpyxl reportlab requests pyinstaller

      - name: PyInstaller 빌드
        run: |
          pyinstaller --onefile --windowed --name "별따오기_이름표생성기" main.py

      - name: GitHub Release 생성 + EXE 업로드
        uses: softprops/action-gh-release@v2
        with:
          files: dist/별따오기_이름표생성기.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
